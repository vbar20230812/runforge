name: runforge
description: "Personal training app for runners targeting 10K goals"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  http: ^1.2.2

  # Charts
  fl_chart: ^0.69.0

  # Calendar
  table_calendar: ^3.1.2

  # Environment
  flutter_dotenv: ^5.2.1

  # Auth (needed for firebase_auth web registration)
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  firebase_core_platform_interface: ^6.0.2

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/exercises/

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
